<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site maintenance</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <main>

    <aside class="sidebar active" data-sidebar aria-hidden="true">

      <div class="sidebar-info">

        <figure class="avatar-box">
          <img src="./assets/images/portrait.png" alt="" width="80">
        </figure>

        <div class="info-content">
          <h1 class="name" title="Maintenance">Maintenance</h1>
          <p class="title">Updates in progress</p>
        </div>

      </div>

      <div class="sidebar-info_more">
        <div class="separator"></div>
        <ul class="contacts-list">
          <li class="contact-item">
            <div class="icon-box">
              <ion-icon name="construct-outline"></ion-icon>
            </div>
            <div class="contact-info">
              <p class="contact-title">Status</p>
              <p class="contact-link" style="cursor: default;">Public portfolio code lives in this repository; the live domain is temporarily parked here.</p>
            </div>
          </li>
        </ul>
      </div>

    </aside>

    <div class="main-content">

      <article class="about active" data-page="about">

        <header>
          <h2 class="h2 article-title">We will be back soon</h2>
        </header>

        <section class="about-text">
          <p>This domain is in maintenance mode while a newer site is prepared. Thank you for your patience.</p>
        </section>

      </article>

    </div>

  </main>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
